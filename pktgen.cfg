[system]
interface = enp0s3      ; 네트워크 카드 인터페이스 이름
pps = 0                 ; 초당 송출 속도 제한 (0: 제한 없음)
duration = 1            ; 실행 시간 (분 단위, 0: 무한대)
use_thread = true       ; 멀티스레드 전송 사용 여부 (true/false)

[data]
min_kb = 2.0            ; 최소 전송 데이터 크기 (KB)
max_kb = 4.0            ; 최대 전송 데이터 크기 (KB)

[user]
ip = 10.0.1.1/24        ; User 시작 IP 대역
count = 100             ; User 노드 가상 대수

[web]
ip = 10.0.2.1/24        ; Web 시작 IP 대역
count = 5               ; Web 노드 가상 대수

[was]
ip = 10.0.3.1/24        ; WAS 시작 IP 대역
count = 2               ; WAS 노드 가상 대수

[db]
ip = 10.0.4.1/24        ; DB 시작 IP 대역
count = 1               ; DB 노드 가상 대수
